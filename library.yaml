default_dirs:
  skills:
    - default: .claude/skills/
    - global: ~/.claude/skills/
  agents:
    - default: .claude/agents/
    - global: ~/.claude/agents/
  prompts:
    - default: .claude/commands/
    - global: ~/.claude/commands/

library:
  skills:
    - name: grill-me
      description: Interview the user relentlessly about a plan or design until reaching shared understanding, resolving each branch of the decision tree
      source: ~/projects/my-library/skills/grill-me/SKILL.md
    - name: prd-to-issues
      description: Break a PRD into independently-grabbable GitHub issues using tracer-bullet vertical slices
      source: ~/projects/my-library/skills/prd-to-issues/SKILL.md
    - name: prd-to-plan
      description: Turn a PRD into a multi-phase implementation plan using tracer-bullet vertical slices, saved as a local Markdown file
      source: ~/projects/my-library/skills/prd-to-plan/SKILL.md
    - name: request-refactor-plan
      description: Create a detailed refactor plan with tiny commits via user interview, then file it as a GitHub issue
      source: ~/projects/my-library/skills/request-refactor-plan/SKILL.md
  agents: []
  prompts: []
